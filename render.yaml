# Render Blueprint for the FastAPI backend.
# You can also create the service manually in the dashboard (see DEPLOY.md) —
# this file just pre-fills the settings.
services:
  - type: web
    name: jalanjalan-backend
    runtime: python
    rootDir: .
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_API_KEY
        sync: false        # paste in the Render dashboard (secret)
      - key: ONEMAP_EMAIL
        sync: false
      - key: ONEMAP_PASSWORD
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false        # set to your Vercel URL (or "*" for the quickest demo)
